name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'team-management/app/**'
      - 'team-management/.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: team-management/app/package-lock.json

      - name: Install dependencies
        working-directory: team-management/app
        run: npm ci

      - name: Build
        working-directory: team-management/app
        run: npm run build
        env:
          VITE_API_BASE: https://team-management-api-j2g9.onrender.com

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: team-management/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
